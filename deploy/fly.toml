app = "pebble-agent-gateway"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[mounts]]
  source = "gateway_data"
  destination = "/data"

[env]
  DATABASE_URL = "file:/data/gateway.sqlite"
  MESSAGE_RETENTION_MODE = "encrypted_ephemeral"
  MESSAGE_TTL_MINUTES = "60"
  DELETE_PAYLOAD_ON_CLAIM = "false"
  DEBUG_RETENTION = "false"
  NTFY_ALLOWED_HOSTS = "ntfy.sh"
